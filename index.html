<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Précieuse ❤️</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (Styles identiques à avant, mais je les recopie pour que ce soit complet) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #ffe6f0, #ffb6c1);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 5;
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 255, 255, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .photo {
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 4px solid white;
            transition: transform 0.3s ease;
        }

        .photo:hover {
            transform: scale(1.05);
        }

        .photo i {
            font-size: 5rem;
            color: #ff4d6d;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #4a2b2b;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        #name {
            color: #c44569;
        }

        .message {
            font-size: 1.3rem;
            font-weight: 300;
            line-height: 1.6;
            color: #3a1f1f;
            background: rgba(255, 255, 255, 0.3);
            padding: 1.5rem;
            border-radius: 20px;
            margin: 1.5rem 0;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button {
            background: #ff4d6d;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
            border: 2px solid white;
            letter-spacing: 1px;
        }

        button:hover {
            background: #ff3355;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        .surprise-message {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-family: 'Dancing Script', cursive;
            color: #4a2b2b;
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem;
            border-radius: 40px;
            display: none;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        @media (max-width: 500px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1.1rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="hearts-container"></div>

    <div class="container">
        <div class="photo">
            <i class="fas fa-heart"></i> <!-- Tu peux remplacer par une photo <img src="..."> -->
        </div>
        <h1>Joyeux Anniversaire, <span id="name">Précieuse</span> !</h1>
        <p class="message">
            Pour la plus merveilleuse des personnes, je te souhaite une journée remplie de bonheur, d'amour et de surprises. <br>
            Tu illumines ma vie chaque jour. Je t'aime énormément, Précieuse ! 🌹
        </p>
        <button id="surpriseBtn">🎁 Clique pour une surprise</button>
        <div id="surpriseMessage" class="surprise-message"></div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        // Attendre que le DOM soit complètement chargé
        document.addEventListener('DOMContentLoaded', function() {
            // ---------- Cœurs flottants ----------
            function createHearts() {
                const container = document.getElementById('hearts-container');
                const colors = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff'];
                for (let i = 0; i < 25; i++) {
                    const heart = document.createElement('i');
                    heart.classList.add('heart', 'fas', 'fa-heart');
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = Math.random() * 10 + 5 + 's';
                    heart.style.fontSize = Math.random() * 2 + 0.8 + 'rem';
                    heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.animationDelay = Math.random() * 5 + 's';
                    container.appendChild(heart);
                }
            }

            // ---------- Confettis (canvas) ----------
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const colorsConfetti = ['#f2d74e', '#95c3fa', '#ff6f91', '#ff4d6d', '#b48cff'];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function createParticle() {
                return {
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    size: Math.random() * 8 + 4,
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1,
                    color: colorsConfetti[Math.floor(Math.random() * colorsConfetti.length)],
                    rotation: Math.random() * 360
                };
            }

            function initConfetti(count = 100) {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push(createParticle());
                }
            }

            function updateConfetti() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();

                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += 0.5;

                    if (p.y > height) {
                        p.y = -10;
                        p.x = Math.random() * width;
                        p.speedY = Math.random() * 3 + 2;
                    }
                }
                requestAnimationFrame(updateConfetti);
            }

            // Lancement des cœurs et des confettis au chargement
            createHearts();
            initConfetti(150);
            updateConfetti();

            // ---------- Bouton surprise (corrigé) ----------
            const surpriseBtn = document.getElementById('surpriseBtn');
            const surpriseDiv = document.getElementById('surpriseMessage');

            surpriseBtn.addEventListener('click', function() {
                // Affiche le message avec les prénoms personnalisés
                surpriseDiv.style.display = 'block';
                surpriseDiv.innerHTML = '🎉 Je t\'aime plus que tout, Précieuse ! Joyeux anniversaire  🎉'; // Personnalisé avec Oli

                // Relance une pluie de confettis
                initConfetti(200);
            });
        });
    </script>
</body>
</html>

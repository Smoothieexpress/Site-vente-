<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIORA — Boutique Premium</title>

<style>
body {
  font-family: Arial;
  background: #0D0D0D;
  color: white;
  margin:0;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#111;
}

button {
  cursor:pointer;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#C9A96E;
  font-size:20px;
}

/* CART */
.cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  display:none;
}

.checkout {
  margin-top:20px;
  background:#C9A96E;
  border:none;
  padding:10px;
  width:100%;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
  <h2>LUMIORA</h2>
  <button onclick="toggleCart()">Panier (<span id="count">0</span>)</button>
</nav>

<div class="products">

<div class="card">
  <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" />
  <h3>Masque LED</h3>
  <p class="price">89€</p>
  <button onclick="add('Masque LED',89)">Ajouter</button>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348" />
  <h3>Lampe rouge</h3>
  <p class="price">119€</p>
  <button onclick="add('Lampe rouge',119)">Ajouter</button>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1588776814546-ec7e5b0e0e0f" />
  <h3>Gua Sha</h3>
  <p class="price">39€</p>
  <button onclick="add('Gua Sha',39)">Ajouter</button>
</div>

</div>

<div class="cart" id="cart">
  <h3>Panier</h3>
  <div id="items"></div>
  <h4>Total: <span id="total">0</span>€</h4>
  <button class="checkout" onclick="checkout()">Payer</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Paiement validé ✅</h2>
    <p>Commande confirmée (simulation)</p>
    <button onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>
let cart=[];

function add(name,price){
  cart.push({name,price});
  render();
}

function render(){
  let items=document.getElementById("items");
  let total=0;

  items.innerHTML="";

  cart.forEach((item,i)=>{
    total+=item.price;
    items.innerHTML+=`
      <p>${item.name} - ${item.price}€ 
      <button onclick="remove(${i})">X</button></p>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
}

function remove(i){
  cart.splice(i,1);
  render();
}

function toggleCart(){
  let c=document.getElementById("cart");
  c.style.display = c.style.display==="block"?"none":"block";
}

function checkout(){
  if(cart.length===0){
    alert("Panier vide");
    return;
  }
  document.getElementById("modal").style.display="flex";
  cart=[];
  render();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>

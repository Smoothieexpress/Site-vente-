<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIORA</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0D0D0D;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#111;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:40px;
}

.card {
  background:#1a1a1a;
  padding:20px;
  text-align:center;
  border:1px solid rgba(201,169,110,0.2);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.price {
  color:#C9A96E;
  font-size:22px;
}

button {
  margin-top:10px;
  padding:10px 20px;
  background:#C9A96E;
  border:none;
  cursor:pointer;
}

/* CART */
.cart {
  position:fixed;
  right:-350px;
  top:0;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.cart.open {
  right:0;
}

.checkout {
  width:100%;
  padding:15px;
  background:#C9A96E;
}

/* CHECKOUT MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:30px;
  width:90%;
  max-width:400px;
}
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<nav>
  <h2>LUMIORA</h2>
  <button onclick="toggleCart()">Panier (<span id="count">0</span>)</button>
</nav>

<section class="products">

<div class="card">
  <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
  <h3>Masque LED</h3>
  <p class="price">89€</p>
  <button onclick="add('Masque LED',89)">Ajouter</button>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
  <h3>Lampe Rouge</h3>
  <p class="price">119€</p>
  <button onclick="add('Lampe Rouge',119)">Ajouter</button>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1588776814546-ec7e5b0e0e0f">
  <h3>Gua Sha</h3>
  <p class="price">39€</p>
  <button onclick="add('Gua Sha',39)">Ajouter</button>
</div>

</section>

<div class="cart" id="cart">
  <h3>Panier</h3>
  <div id="items"></div>
  <h4>Total: <span id="total">0</span>€</h4>
  <button class="checkout" onclick="openCheckout()">Commander</button>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>Paiement</h3>
    <input placeholder="Nom complet">
    <input placeholder="Email">
    <input placeholder="Adresse livraison">
    <button onclick="confirmOrder()">Payer</button>
    <button onclick="closeCheckout()">Annuler</button>
  </div>
</div>

<script>
let cart=[];

function add(name,price){
  let item=cart.find(i=>i.name===name);
  if(item){item.qty++;}
  else{cart.push({name,price,qty:1});}
  render();
}

function render(){
  let html="";
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.price*item.qty;
    html+=`
      <p>${item.name} x${item.qty} - ${item.price*item.qty}€
      <button onclick="remove(${i})">X</button></p>
    `;
  });
  document.getElementById("items").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
}

function remove(i){
  cart.splice(i,1);
  render();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function openCheckout(){
  if(cart.length===0){
    alert("Panier vide");
    return;
  }
  document.getElementById("checkoutModal").style.display="flex";
}

function closeCheckout(){
  document.getElementById("checkoutModal").style.display="none";
}

function confirmOrder(){
  alert("Commande validée ✅");
  cart=[];
  render();
  closeCheckout();
}
</script>

</body>
</html>
